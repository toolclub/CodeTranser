apiVersion: apps/v1
kind: Deployment
metadata:
  name: cascade-frontend
  namespace: cascade
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cascade-frontend
  template:
    metadata:
      labels:
        app: cascade-frontend
    spec:
      containers:
        - name: frontend
          image: cascade-frontend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: cascade-frontend
  namespace: cascade
spec:
  selector: { app: cascade-frontend }
  ports:
    - port: 80
      targetPort: 80
---
# Ingress:统一入口,域名解析后通过 nginx-ingress 进入 frontend service
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cascade-ingress
  namespace: cascade
  annotations:
    # SSE 流式必须项(对齐前端 nginx)
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    # WS upgrade
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  rules:
    - host: cascade.example.com   # ← 替换成你的域名
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cascade-frontend
                port:
                  number: 80
