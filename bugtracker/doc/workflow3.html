<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增分析 - 环境配置</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }

        /* 顶部导航栏 */
        .top-bar {
            background: #fff;
            padding: 16px 30px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: #666;
            margin-right: 30px;
        }

        .back-btn:hover {
            background: #eeeeee;
            color: #333;
        }

        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a237e;
        }

        /* 步骤导航 */
        .step-navigation {
            background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
            padding: 40px 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .step-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            background: rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            transition: all 0.3s;
        }

        .step-item.active .step-circle {
            background: #64b5f6;
            color: #fff;
            box-shadow: 0 0 20px rgba(100, 181, 246, 0.5);
        }

        .step-item.completed .step-circle {
            background: #81c784;
            color: #fff;
        }

        .step-label {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            transition: color 0.3s;
        }

        .step-item.active .step-label {
            color: #fff;
            font-weight: 500;
        }

        .step-item.completed .step-label {
            color: #a5d6a7;
        }

        .step-connector {
            width: 80px;
            height: 2px;
            background: rgba(255,255,255,0.2);
            margin: 0 20px;
        }

        .step-connector.completed {
            background: #81c784;
        }

        /* 主要内容区域 */
        .main-content {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .section-header {
            padding: 20px 30px;
            border-bottom: 1px solid #eee;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a237e;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: #1976d2;
        }

        .section-body {
            padding: 30px;
        }

        /* 提示信息 */
        .info-tip {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px 20px;
            background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%);
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 4px solid #ffc107;
        }

        .info-tip i {
            color: #f57c00;
            font-size: 18px;
            margin-top: 2px;
        }

        .info-tip p {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        /* 环境配置卡片 */
        .env-cards {
            display: grid;
            gap: 20px;
        }

        .env-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px 24px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 12px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .env-card:hover {
            border-color: #1976d2;
            box-shadow: 0 4px 16px rgba(25, 118, 210, 0.15);
        }

        .env-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
        }

        .env-info {
            flex: 1;
        }

        .env-title {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .env-label {
            font-size: 13px;
            color: #666;
        }

        .env-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .env-input-label {
            font-size: 13px;
            color: #666;
        }

        .env-input {
            width: 100px;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            outline: none;
            transition: all 0.3s;
        }

        .env-input:focus {
            border-color: #1976d2;
            box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
        }

        /* 底部操作按钮 */
        .footer-actions {
            display: flex;
            justify-content: space-between;
            padding: 20px 30px;
            background: #fafafa;
            border-top: 1px solid #eee;
        }

        .btn {
            padding: 12px 32px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-prev {
            background: #fff;
            border: 2px solid #ddd;
            color: #666;
        }

        .btn-prev:hover {
            border-color: #bbb;
            background: #fafafa;
        }

        .btn-next {
            background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
            border: none;
            color: #fff;
        }

        .btn-next:hover {
            background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(25, 118, 210, 0.3);
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="top-bar">
        <button class="back-btn" onclick="location.href='workflow2.html'">
            <i class="fas fa-arrow-left"></i>
            返回上一步
        </button>
        <h1 class="page-title">新增分析</h1>
    </div>

    <!-- 步骤导航 -->
    <div class="step-navigation">
        <div class="step-item completed">
            <div class="step-circle"><i class="fas fa-check"></i></div>
            <span class="step-label">基础配置</span>
        </div>
        <div class="step-connector completed"></div>
        <div class="step-item completed">
            <div class="step-circle"><i class="fas fa-check"></i></div>
            <span class="step-label">用例配置</span>
        </div>
        <div class="step-connector completed"></div>
        <div class="step-item active">
            <div class="step-circle">3</div>
            <span class="step-label">环境配置</span>
        </div>
        <div class="step-connector"></div>
        <div class="step-item">
            <div class="step-circle">4</div>
            <span class="step-label">执行操作</span>
        </div>
    </div>

    <!-- 主要内容区域 -->
    <div class="main-content">
        <div class="section-card">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-server"></i>
                    环境配置
                </h2>
            </div>
            <div class="section-body">
                <!-- 提示信息 -->
                <div class="info-tip">
                    <i class="fas fa-info-circle"></i>
                    <p>按物理拓扑分组配置环境，默认选择上次用例使用环境</p>
                </div>

                <!-- 环境配置项 -->
                <div class="env-cards">
                    <div class="env-card">
                        <div class="env-icon">
                            <i class="fas fa-microchip"></i>
                        </div>
                        <div class="env-info">
                            <div class="env-title">FO1_UMPTB_TOPO1_NEW</div>
                            <div class="env-label">UMPTB 物理拓扑环境</div>
                        </div>
                        <div class="env-input-group">
                            <span class="env-input-label">环境序号</span>
                            <input type="text" class="env-input" value="107">
                        </div>
                    </div>

                    <div class="env-card">
                        <div class="env-icon">
                            <i class="fas fa-network-wired"></i>
                        </div>
                        <div class="env-info">
                            <div class="env-title">FO3_UMPTEC05_TOPO1_NEW</div>
                            <div class="env-label">UMPTEC05 物理拓扑环境</div>
                        </div>
                        <div class="env-input-group">
                            <span class="env-input-label">环境序号</span>
                            <input type="text" class="env-input" value="310">
                        </div>
                    </div>

                    <div class="env-card">
                        <div class="env-icon">
                            <i class="fas fa-project-diagram"></i>
                        </div>
                        <div class="env-info">
                            <div class="env-title">FO5_UMPPTH_UMPTG_TOPO2_LB2</div>
                            <div class="env-label">UMPPTH+UMPTG 组合拓扑环境</div>
                        </div>
                        <div class="env-input-group">
                            <span class="env-input-label">环境序号</span>
                            <input type="text" class="env-input" value="544">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 底部操作按钮 -->
            <div class="footer-actions">
                <button class="btn btn-prev" onclick="location.href='workflow2.html'">
                    <i class="fas fa-arrow-left"></i>
                    上一步
                </button>
                <button class="btn btn-next" onclick="location.href='workflow4.html'">
                    下一步
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
