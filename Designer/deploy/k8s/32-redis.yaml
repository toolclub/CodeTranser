apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cascade-redis-pvc
  namespace: cascade
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cascade-redis
  namespace: cascade
spec:
  serviceName: cascade-redis
  replicas: 1
  selector:
    matchLabels:
      app: cascade-redis
  template:
    metadata:
      labels:
        app: cascade-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 1Gi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cascade-redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: cascade-redis
  namespace: cascade
spec:
  selector: { app: cascade-redis }
  ports:
    - port: 6379
      targetPort: 6379
